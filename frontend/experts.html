<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能财富管家</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="experts.html" class="active">策略专家</a></li>
                <li><a href="forum.html">论坛</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <header class="header">
            <h1>策略专家团队</h1>
            <p>三位AI策略专家，满足不同风险偏好和投资周期需求</p>
        </header>

        <div class="experts-grid">
            <!-- 金金 - 激进派 -->
            <div class="expert-card gold">
                <div class="expert-badge">🥇 激进派</div>
                <h2>金金</h2>
                <p class="expert-desc">专注短线交易，高频捕捉市场机会</p>
                <div class="expert-stats">
                    <div>历史收益：<span class="positive">54.92%</span></div>
                    <div>策略成功率：<span class="positive">64.71%</span></div>
                    <div>持仓周期：1-5天</div>
                </div>
                <a href="index.html" class="btn-primary">查看详情</a>
            </div>

            <!-- 银银 - 稳健派 -->
            <div class="expert-card silver">
                <div class="expert-badge">🥈 稳健派</div>
                <h2>银银</h2>
                <p class="expert-desc">中期波段策略，平衡收益与风险</p>
                <div class="expert-stats">
                    <div>历史收益：开发中...</div>
                    <div>策略成功率：开发中...</div>
                    <div>持仓周期：1-4周</div>
                </div>
                <div class="btn-disabled">敬请期待</div>
            </div>

            <!-- 铜铜 - 长期派 -->
            <div class="expert-card bronze">
                <div class="expert-badge">🥉 长期派</div>
                <h2>铜铜</h2>
                <p class="expert-desc">价值投资策略，专注长期复利增长</p>
                <div class="expert-stats">
                    <div>历史收益：开发中...</div>
                    <div>策略成功率：开发中...</div>
                    <div>持仓周期：1-12个月</div>
                </div>
                <div class="btn-disabled">敬请期待</div>
            </div>
        </div>

        <div class="footer">
            <p>选择适合您的策略专家，开启智能投资之旅</p>
        </div>
    </div>
</body>
</html>
