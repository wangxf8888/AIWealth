<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能财富管家</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <ul class="nav-menu">
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="experts.html">策略专家</a></li>
                <li><a href="forum.html">论坛</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <h1>智能财富管家 · 金金</h1>
            <p>专注短线交易，高频捕捉市场机会</p>
        </header>

        <!-- 策略概览 -->
        <div class="strategy-summary">
            <div class="summary-card">
                <h3>历史总收益</h3>
                <div class="metric" id="totalProfit">--%</div>
            </div>
            <div class="summary-card">
                <h3>策略成功率</h3>
                <div class="metric" id="winRate">--%</div>
            </div>
            <div class="summary-card">
                <h3>总交易次数</h3>
                <div class="metric" id="tradeCount">--</div>
            </div>
            <div class="summary-card">
                <h3>平均收益</h3>
                <div class="metric" id="avgProfit">--%</div>
            </div>
        </div>

        <!-- 账户概览 -->
        <div class="cost-summary">
            <h2>账户概览</h2>
            <div class="cost-details">
                <div class="cost-item">
                    <span>总成本:</span>
                    <span id="totalCost">¥--</span>
                </div>
                <div class="cost-item">
                    <span>当前市值:</span>
                    <span id="currentValue">¥--</span>
                </div>
                <div class="cost-item">
                    <span>总盈亏:</span>
                    <span id="totalPnL" class="pnl">--%</span>
                </div>
            </div>
        </div>

        <!-- 持仓与信号并排 -->
        <div class="holdings-signals-container">
            <!-- 当前持仓分布 -->
            <div class="chart-container half">
                <h2>当前持仓分布</h2>
                <div class="chart-area">
                    <canvas id="holdingsChart"></canvas>
                </div>
            </div>

            <!-- 最新交易信号 -->
            <div class="latest-recommendations half">
                <h2>最新交易信号</h2>
                <div id="recommendationsList">
                    <p>加载中...</p>
                </div>
            </div>
        </div>

        <!-- 收益曲线图 -->
        <div class="chart-container">
            <h2>策略历史表现</h2>
            <div class="chart-controls">
                <button class="year-btn active" data-year="all">全部</button>
                <button class="year-btn" data-year="2023">2023</button>
                <button class="year-btn" data-year="2024">2024</button>
                <button class="year-btn" data-year="2025">2025</button>
            </div>
            <div class="chart-area">
                <canvas id="profitChart"></canvas>
            </div>
        </div>

        <!-- 金金策略优势 -->
        <div class="strategy-advantages">
            <h3>金金策略核心优势</h3>
            <div class="expert-row gold">
                <div class="expert-name">🥇 金金</div>
                <div class="expert-features">
                    <div class="feature-item">🎯 短线交易 | 1-5天持仓</div>
                    <div class="feature-item">📊 5%收益目标 | 高频机会</div>
                    <div class="feature-item">🛡️ 严格止损 | 单股持仓</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/chart.js"></script>
    <script>
        // 年份切换逻辑
        document.querySelectorAll('.year-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const year = this.getAttribute('data-year');
                window.performanceChartInstance.loadYear(year === 'all' ? null : parseInt(year));
            });
        });
    </script>
</body>
</html>
